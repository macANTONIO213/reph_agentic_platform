<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — REPH Agentic AI Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 12px;
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
      }
      .login-card h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
        color: #f8fafc;
      }
      .login-card p {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      label {
        display: block;
        font-size: 0.78rem;
        color: #94a3b8;
        margin-bottom: 0.4rem;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.6rem 0.75rem;
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      input:focus {
        outline: 2px solid #6366f1;
        border-color: transparent;
      }
      .error {
        background: #3b1a1a;
        border: 1px solid #7f2020;
        border-radius: 6px;
        padding: 0.6rem 0.75rem;
        font-size: 0.82rem;
        color: #f87171;
        margin-bottom: 1rem;
      }
      button[type="submit"] {
        width: 100%;
        padding: 0.65rem;
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
      }
      button[type="submit"]:hover { background: #4f52d4; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>REPH Agentic AI Platform</h1>
      <p>Sign in to access the control plane.</p>
      {% if form.errors %}
        <div class="error">Invalid username or password. Please try again.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label for="id_username">Username</label>
        <input id="id_username" type="text" name="username" autofocus autocomplete="username" required>
        <label for="id_password">Password</label>
        <input id="id_password" type="password" name="password" autocomplete="current-password" required>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
