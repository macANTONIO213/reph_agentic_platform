services:
  - type: web
    name: reph-agentic-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn agentic_platform.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reph-agentic-platform-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: reph-agentic-platform-db
    databaseName: agentic_platform
    user: agentic_platform
